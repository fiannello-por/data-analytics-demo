type: model
name: sqo_daily_cumulative
sql_from: |-
  (
    WITH curr AS (
      SELECT
        EXTRACT(DAYOFYEAR FROM QualifiedDate) AS day_of_year,
        COUNT(DISTINCT Id) AS daily_sqos
      FROM `data-analytics-306119.sfdc.OpportunityViewTable`
      WHERE Accepted = TRUE
        AND Type = 'New Business'
        AND EXTRACT(YEAR FROM QualifiedDate) = EXTRACT(YEAR FROM CURRENT_DATE())
      GROUP BY 1
    ),
    prev AS (
      SELECT
        EXTRACT(DAYOFYEAR FROM QualifiedDate) AS day_of_year,
        COUNT(DISTINCT Id) AS daily_sqos
      FROM `data-analytics-306119.sfdc.OpportunityViewTable`
      WHERE Accepted = TRUE
        AND Type = 'New Business'
        AND EXTRACT(YEAR FROM QualifiedDate) = EXTRACT(YEAR FROM CURRENT_DATE()) - 1
      GROUP BY 1
    )
    SELECT
      COALESCE(c.day_of_year, p.day_of_year) AS day,
      SUM(COALESCE(c.daily_sqos, 0)) OVER (ORDER BY COALESCE(c.day_of_year, p.day_of_year)) AS sqo_running_total,
      SUM(COALESCE(p.daily_sqos, 0)) OVER (ORDER BY COALESCE(c.day_of_year, p.day_of_year)) AS sqo_prev_running_total
    FROM curr c
    FULL OUTER JOIN prev p ON c.day_of_year = p.day_of_year
  )
label: 'SQO Daily Cumulative'
group_label: 'Sales Operations'

dimensions:
  - name: day
    type: number
    sql: ${TABLE}.day
    label: 'Day of Year'
    description: 'Day of year (1-365) for year-over-year SQO trend comparison.'

metrics:
  sqo_running_total:
    type: max
    sql: ${TABLE}.sqo_running_total
    label: 'SQO Count'
    description: 'Cumulative SQO count for the current year through this day.'

  sqo_prev_running_total:
    type: max
    sql: ${TABLE}.sqo_prev_running_total
    label: 'SQO Count (previous year)'
    description: 'Cumulative SQO count for the previous year through this day.'

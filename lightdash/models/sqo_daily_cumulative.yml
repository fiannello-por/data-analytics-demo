type: model
name: sqo_daily_cumulative
sql_from: |-
  (
    WITH date_spine AS (
      SELECT d AS day
      FROM UNNEST(GENERATE_DATE_ARRAY(DATE_TRUNC(CURRENT_DATE(), YEAR), CURRENT_DATE())) AS d
    ),
    curr AS (
      SELECT DATE(QualifiedDate) AS day, COUNT(DISTINCT Id) AS cnt
      FROM `data-analytics-306119.sfdc.OpportunityViewTable`
      WHERE Accepted = TRUE AND Type = 'New Business'
      AND QualifiedDate >= DATE_TRUNC(CURRENT_DATE(), YEAR)
      AND QualifiedDate <= CURRENT_DATE()
      GROUP BY 1
    ),
    prev AS (
      SELECT DATE_ADD(DATE(QualifiedDate), INTERVAL 1 YEAR) AS day, COUNT(DISTINCT Id) AS cnt
      FROM `data-analytics-306119.sfdc.OpportunityViewTable`
      WHERE Accepted = TRUE AND Type = 'New Business'
      AND QualifiedDate >= DATE_TRUNC(DATE_SUB(CURRENT_DATE(), INTERVAL 1 YEAR), YEAR)
      AND QualifiedDate <= DATE_SUB(CURRENT_DATE(), INTERVAL 1 YEAR)
      GROUP BY 1
    )
    SELECT
      ds.day,
      COALESCE(c.cnt, 0) AS sqo_curr,
      COALESCE(p.cnt, 0) AS sqo_prev,
      SUM(COALESCE(c.cnt, 0)) OVER (ORDER BY ds.day) AS sqo_running_total,
      SUM(COALESCE(p.cnt, 0)) OVER (ORDER BY ds.day) AS sqo_prev_running_total
    FROM date_spine ds
    LEFT JOIN curr c ON ds.day = c.day
    LEFT JOIN prev p ON ds.day = p.day
    ORDER BY ds.day
  )
label: 'SQO Daily Cumulative'
group_label: 'Sales Operations'

dimensions:
  - name: day
    type: date
    sql: ${TABLE}.day
    label: 'Day'
    description: 'Date for year-over-year SQO trend comparison.'
    time_intervals: [DAY, WEEK, MONTH, QUARTER, YEAR]

metrics:
  sqo_running_total:
    type: max
    sql: ${TABLE}.sqo_running_total
    label: 'SQO Count'
    description: 'Cumulative SQO count for the current year through this day.'

  sqo_prev_running_total:
    type: max
    sql: ${TABLE}.sqo_prev_running_total
    label: 'SQO Count (previous year)'
    description: 'Cumulative SQO count for the previous year through this day.'

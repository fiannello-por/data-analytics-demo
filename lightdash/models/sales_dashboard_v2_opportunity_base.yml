type: model
name: sales_dashboard_v2_opportunity_base
sql_from: '`data-analytics-306119.scorecard_test.sales_dashboard_v2_opportunity_base`'
label: 'Sales Dashboard v2 Opportunity Base'
group_label: 'Situation Room v2'

dimensions:
  - name: opportunity_id
    type: string
    sql: ${TABLE}.opportunity_id
    primary_key: true
    hidden: true
    description: 'Unique Salesforce opportunity identifier at the serving-table grain.'

  - name: dashboard_category
    type: string
    sql: ${TABLE}.dashboard_category
    label: 'Dashboard Category'
    description: 'Normalized dashboard category used by the scorecards: New Logo, Expansion, Migration, or Renewal.'

  - name: close_date
    type: date
    sql: ${TABLE}.close_date
    label: 'Close Date'
    description: 'Opportunity close date used for booked metrics and closed-won pacing.'
    time_intervals: [DAY, WEEK, MONTH, QUARTER, YEAR]

  - name: created_date
    type: date
    sql: ${TABLE}.created_date
    label: 'Created Date'
    description: 'Opportunity creation date used for pipeline-created and SQL-style metrics.'
    time_intervals: [DAY, WEEK, MONTH, QUARTER, YEAR]

  - name: pipeline_start_date
    type: date
    sql: ${TABLE}.pipeline_start_date
    label: 'Pipeline Start Date'
    description: 'Pipeline start date used for pipeline-created trend and snapshot calculations.'
    time_intervals: [DAY, WEEK, MONTH, QUARTER, YEAR]

  - name: sales_qualified_date
    type: date
    sql: ${TABLE}.sales_qualified_date
    label: 'Sales Qualified Date'
    description: 'Date the opportunity became sales-qualified for POR-style SQO metrics.'
    time_intervals: [DAY, WEEK, MONTH, QUARTER, YEAR]

  - name: expansion_qualified_date
    type: date
    sql: ${TABLE}.expansion_qualified_date
    label: 'Expansion Qualified Date'
    description: 'Qualification date used for expansion and migration SQO logic.'
    time_intervals: [DAY, WEEK, MONTH, QUARTER, YEAR]

  - name: gate1_completed_date
    type: date
    sql: ${TABLE}.gate1_completed_date
    label: 'Gate 1 Completed Date'
    description: 'Date Gate 1 criteria was completed for the opportunity.'
    time_intervals: [DAY, WEEK, MONTH, QUARTER, YEAR]

  - name: expansion_submitted_date
    type: date
    sql: ${TABLE}.expansion_submitted_date
    label: 'Expansion Submitted Date'
    description: 'Submission date used for migration SAL logic.'
    time_intervals: [DAY, WEEK, MONTH, QUARTER, YEAR]

  - name: contract_start_date
    type: date
    sql: ${TABLE}.contract_start_date
    label: 'Contract Start Date'
    description: 'Contract start date associated with the opportunity.'
    time_intervals: [DAY, WEEK, MONTH, QUARTER, YEAR]

  - name: division
    type: string
    sql: ${TABLE}.division
    label: 'Division'
    description: 'Commercial division attributed to the opportunity.'

  - name: owner
    type: string
    sql: ${TABLE}.owner
    label: 'Owner'
    description: 'Current opportunity owner.'

  - name: opportunity_segment
    type: string
    sql: ${TABLE}.opportunity_segment
    label: 'Segment'
    description: 'Opportunity segment classification.'

  - name: region
    type: string
    sql: ${TABLE}.region
    label: 'Region'
    description: 'Regional queue or territory aligned to the opportunity.'

  - name: se
    type: string
    sql: ${TABLE}.se
    label: 'SE'
    description: 'Assigned sales engineer.'

  - name: booking_plan_opp_type_2025
    type: string
    sql: ${TABLE}.booking_plan_opp_type_2025
    label: 'Booking Plan Opp Type 2025'
    description: '2025 booking-plan opportunity type classification.'

  - name: product_family
    type: string
    sql: ${TABLE}.product_family
    label: 'Product Family'
    description: 'Primary product family associated with the opportunity.'

  - name: sdr_source
    type: string
    sql: ${TABLE}.sdr_source
    label: 'SDR Source'
    description: 'Lead source or SDR attribution channel.'

  - name: sdr
    type: string
    sql: ${TABLE}.sdr
    label: 'SDR'
    description: 'Sales development representative credited on the opportunity.'

  - name: opp_record_type
    type: string
    sql: ${TABLE}.opp_record_type
    label: 'POR / R360'
    description: 'Opportunity record-type grouping used in POR versus R360 reporting.'

  - name: account_owner
    type: string
    sql: ${TABLE}.account_owner
    label: 'Account Owner'
    description: 'Owner of the related account record.'

  - name: owner_department
    type: string
    sql: ${TABLE}.owner_department
    label: 'Owner Department'
    description: 'Department associated with the current opportunity owner.'

  - name: strategic_filter
    type: boolean
    sql: ${TABLE}.strategic_filter
    label: 'Strategic Filter'
    description: 'True when the opportunity is marked for strategic dashboard filtering.'

  - name: accepted
    type: boolean
    sql: ${TABLE}.accepted
    label: 'Accepted'
    description: 'True when the opportunity was accepted by an account executive.'

  - name: gate1_criteria_met
    type: boolean
    sql: ${TABLE}.gate1_criteria_met
    label: 'Gate 1 Criteria Met'
    description: 'True when the opportunity met Gate 1 criteria.'

  - name: gate_met_or_accepted
    type: boolean
    sql: ${TABLE}.gate_met_or_accepted
    label: 'Gate Met or Accepted'
    description: 'True when the opportunity met Gate 1 criteria or was accepted.'

  - name: type
    type: string
    sql: ${TABLE}.type
    hidden: true
    description: 'Raw Salesforce opportunity type used internally by semantic measures.'

  - name: stage_name
    type: string
    sql: ${TABLE}.stage_name
    hidden: true
    description: 'Raw Salesforce stage name used internally by semantic measures.'

  - name: won
    type: boolean
    sql: ${TABLE}.won
    hidden: true
    description: 'True when the opportunity is marked won.'

  - name: is_closed
    type: boolean
    sql: ${TABLE}.is_closed
    hidden: true
    description: 'True when the opportunity is in a closed stage.'

  - name: expansion_opp
    type: boolean
    sql: ${TABLE}.expansion_opp
    hidden: true
    description: 'True when the opportunity is flagged as an expansion opportunity.'

  - name: expansion_qualified
    type: boolean
    sql: ${TABLE}.expansion_qualified
    hidden: true
    description: 'True when the expansion opportunity qualified.'

  - name: expansion_submitted
    type: boolean
    sql: ${TABLE}.expansion_submitted
    hidden: true
    description: 'True when the opportunity was submitted in the expansion workflow.'

  - name: migration_opp
    type: boolean
    sql: ${TABLE}.migration_opp
    hidden: true
    description: 'True when the opportunity is flagged as a migration opportunity.'

  - name: acv
    type: number
    sql: ${TABLE}.acv
    hidden: true
    description: 'Raw ACV used by booked and quoted deal metrics.'

  - name: hard_imp_value_usd
    type: number
    sql: ${TABLE}.hard_imp_value_usd
    hidden: true
    description: 'Raw one-time implementation value used for one-time revenue.'

  - name: age_days
    type: number
    sql: ${TABLE}.age_days
    hidden: true
    description: 'Opportunity age in days.'

  - name: raw_sdr_points
    type: number
    sql: ${TABLE}.sdr_points
    hidden: true
    description: 'Raw SDR points value.'

  - name: users
    type: number
    sql: ${TABLE}.users
    hidden: true
    description: 'Raw user count associated with the opportunity.'

metrics:
  bookings_amount:
    type: sum
    sql: 'CASE WHEN ${TABLE}.won THEN ${TABLE}.acv ELSE NULL END'
    label: 'Bookings $'
    format: usd
    round: 0
    description: 'Booked annual contract value for won opportunities in the filtered slice.'

  bookings_count:
    type: count_distinct
    sql: 'CASE WHEN ${TABLE}.won THEN ${TABLE}.opportunity_id ELSE NULL END'
    label: 'Bookings #'
    description: 'Distinct won opportunities in the filtered slice.'

  annual_pacing_ytd:
    type: number
    sql: 'COALESCE(SUM(CASE WHEN ${TABLE}.won THEN ${TABLE}.acv END), 0) * 365.0 / NULLIF(DATE_DIFF(MAX(${TABLE}.close_date), MIN(${TABLE}.close_date), DAY) + 1, 0)'
    label: 'Annual Pacing (YTD)'
    format: usd
    round: 0
    description: 'Annualized booked ACV pace for the filtered close-date window.'

  close_rate:
    type: number
    sql: 'SAFE_DIVIDE(COUNT(DISTINCT CASE WHEN ${TABLE}.is_closed AND ${TABLE}.won THEN ${TABLE}.opportunity_id END), COUNT(DISTINCT CASE WHEN ${TABLE}.is_closed THEN ${TABLE}.opportunity_id END))'
    label: 'Close Rate'
    format: percent
    round: 1
    description: 'Share of filtered closed opportunities that were won.'

  avg_age:
    type: average
    sql: 'CASE WHEN ${TABLE}.won AND ${TABLE}.age_days > 0 THEN ${TABLE}.age_days ELSE NULL END'
    label: 'Avg Age'
    round: 0
    description: 'Average age in days of won opportunities in the filtered slice.'

  avg_booked_deal:
    type: average
    sql: 'CASE WHEN ${TABLE}.won AND ${TABLE}.acv > 0 THEN ${TABLE}.acv ELSE NULL END'
    label: 'Avg Booked Deal'
    format: usd
    round: 0
    description: 'Average booked ACV for won opportunities.'

  avg_quoted_deal:
    type: average
    sql: 'CASE WHEN ${TABLE}.acv > 0 THEN ${TABLE}.acv ELSE NULL END'
    label: 'Avg Quoted Deal'
    format: usd
    round: 0
    description: 'Average quoted ACV for the filtered opportunity set.'

  pipeline_created:
    type: sum
    sql: 'CASE WHEN ${TABLE}.acv > 0 THEN ${TABLE}.acv ELSE NULL END'
    label: 'Pipeline Created'
    format: usd
    round: 0
    description: 'Quoted pipeline value created in the filtered pipeline-start window.'

  sql_count:
    type: count_distinct
    sql: ${TABLE}.opportunity_id
    label: 'SQL'
    description: 'Distinct opportunities created in the filtered SQL window.'

  expansion_sql_count:
    type: count_distinct
    sql: 'CASE WHEN ${TABLE}.expansion_opp AND ${TABLE}.opp_record_type = ''POR'' THEN ${TABLE}.opportunity_id ELSE NULL END'
    label: 'Expansion SQL'
    description: 'Expansion SQL count using the POR-scoped definition.'

  migration_sql_count:
    type: count_distinct
    sql: 'CASE WHEN ${TABLE}.migration_opp AND ${TABLE}.opp_record_type = ''POR'' THEN ${TABLE}.opportunity_id ELSE NULL END'
    label: 'Migration SQL'
    description: 'Migration SQL count using the POR-scoped definition.'

  renewal_sql_count:
    type: count_distinct
    sql: ${TABLE}.opportunity_id
    label: 'Renewal SQL'
    description: 'Renewal SQL count aligned to the close-date reporting grain.'

  sqo_count:
    type: count_distinct
    sql: 'CASE WHEN ${TABLE}.accepted AND ${TABLE}.opp_record_type = ''POR'' THEN ${TABLE}.opportunity_id ELSE NULL END'
    label: 'SQO'
    description: 'POR-scoped SQO count for New Logo style reporting.'

  expansion_sqo_count:
    type: count_distinct
    sql: 'CASE WHEN ${TABLE}.expansion_opp AND ${TABLE}.expansion_qualified AND ${TABLE}.opp_record_type = ''POR'' AND ${TABLE}.acv >= 0 THEN ${TABLE}.opportunity_id ELSE NULL END'
    label: 'Expansion SQO'
    description: 'Expansion SQO count using the expansion-qualified workflow.'

  migration_sqo_count:
    type: count_distinct
    sql: 'CASE WHEN ${TABLE}.migration_opp AND ${TABLE}.expansion_qualified AND ${TABLE}.opp_record_type = ''POR'' THEN ${TABLE}.opportunity_id ELSE NULL END'
    label: 'Migration SQO'
    description: 'Migration SQO count using the migration-qualified workflow.'

  gate_1_complete_count:
    type: count_distinct
    sql: 'CASE WHEN ${TABLE}.gate1_criteria_met THEN ${TABLE}.opportunity_id ELSE NULL END'
    label: 'Gate 1 Complete'
    description: 'Distinct opportunities that completed Gate 1 criteria.'

  sdr_points:
    type: sum
    sql: 'CASE WHEN ${TABLE}.gate1_criteria_met THEN ${TABLE}.sdr_points ELSE NULL END'
    label: 'SDR Points'
    round: 0
    description: 'Total SDR points attributed to Gate 1-complete opportunities.'

  sqo_users:
    type: sum
    sql: 'CASE WHEN ${TABLE}.accepted AND ${TABLE}.sales_qualified_date IS NOT NULL THEN ${TABLE}.users ELSE NULL END'
    label: 'SQO Users'
    round: 0
    description: 'Total users attached to accepted SQO opportunities.'

  migration_sal_count:
    type: count_distinct
    sql: 'CASE WHEN ${TABLE}.migration_opp AND ${TABLE}.opp_record_type = ''POR'' AND ${TABLE}.expansion_submitted THEN ${TABLE}.opportunity_id ELSE NULL END'
    label: 'SAL'
    description: 'Migration SAL count driven by submitted migration opportunities.'

  avg_users:
    type: average
    sql: 'CASE WHEN ${TABLE}.won THEN ${TABLE}.users ELSE NULL END'
    label: 'Avg Users'
    round: 0
    description: 'Average users for won opportunities.'

  one_time_revenue:
    type: sum
    sql: 'CASE WHEN ${TABLE}.won AND ${TABLE}.hard_imp_value_usd > 0 THEN ${TABLE}.hard_imp_value_usd ELSE NULL END'
    label: 'One-time Revenue'
    format: usd
    round: 0
    description: 'Booked one-time implementation revenue for won opportunities.'

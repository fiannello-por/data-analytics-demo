type: model
name: opportunity_view
sql_from: 'data-analytics-306119.sfdc.OpportunityViewTable'
label: 'Opportunity View'
group_label: 'Sales Operations'

dimensions:
  # --- Hyperlink dimensions ---
  - name: AccountName
    type: string
    sql: ${TABLE}.AccountName
    label: 'Account Hyperlink'
    urls:
      - label: 'Open Account'
        url: '${row.AccountLink.raw}'

  - name: OpportunityName
    type: string
    sql: ${TABLE}.OpportunityName
    label: 'Opp Hyperlink'
    urls:
      - label: 'Open Opportunity'
        url: '${row.OpportunityLink.raw}'

  - name: AccountLink
    type: string
    sql: ${TABLE}.AccountLink
    hidden: true

  - name: OpportunityLink
    type: string
    sql: ${TABLE}.OpportunityLink
    hidden: true

  # --- Date dimensions ---
  - name: CloseDate
    type: date
    sql: ${TABLE}.CloseDate
    label: 'Close Date'
    time_intervals: [DAY, WEEK, MONTH, QUARTER, YEAR]

  - name: CreatedDate
    type: date
    sql: ${TABLE}.CreatedDate
    label: 'Created Date'
    time_intervals: [DAY, WEEK, MONTH, QUARTER, YEAR]

  - name: contract_start_date__c
    type: date
    sql: ${TABLE}.contract_start_date__c
    label: 'Contract Start Date'
    time_intervals: [DAY, WEEK, MONTH, QUARTER, YEAR]

  - name: QualifiedDate
    type: date
    sql: ${TABLE}.QualifiedDate
    label: 'Qualified Date'
    time_intervals: [DAY, WEEK, MONTH, QUARTER, YEAR]

  - name: InstallDate
    type: date
    sql: ${TABLE}.InstallDate
    label: 'Install Date'
    time_intervals: [DAY, WEEK, MONTH, QUARTER, YEAR]

  - name: Quarter
    type: string
    sql: "CONCAT(CAST(EXTRACT(YEAR FROM ${TABLE}.CloseDate) AS STRING), '-Q', CAST(EXTRACT(QUARTER FROM ${TABLE}.CloseDate) AS STRING))"
    label: 'Quarter'

  # --- String dimensions ---
  - name: Division
    type: string
    sql: ${TABLE}.Division

  - name: Type
    type: string
    sql: ${TABLE}.Type

  - name: ProductFamily
    type: string
    sql: ${TABLE}.ProductFamily
    label: 'Product'

  - name: BookingPlanOppType2025
    type: string
    sql: ${TABLE}.BookingPlanOppType2025
    label: 'Booking Plan Opp Type 2025'

  - name: Owner
    type: string
    sql: ${TABLE}.Owner

  - name: SDR
    type: string
    sql: ${TABLE}.SDR

  - name: OppRecordType
    type: string
    sql: ${TABLE}.OppRecordType
    label: 'POR / R360'

  - name: SE
    type: string
    sql: ${TABLE}.SE

  - name: SDRSource
    type: string
    sql: ${TABLE}.SDRSource
    label: 'SDR Source'

  - name: OpportunitySegment
    type: string
    sql: ${TABLE}.OpportunitySegment
    label: 'Segment'

  - name: Queue_Region__c
    type: string
    sql: ${TABLE}.Queue_Region__c
    label: 'Region'

  - name: StrategicFilter
    type: boolean
    sql: ${TABLE}.StrategicFilter
    label: 'Strategic Filter'

  - name: Gate1CriteriaMet
    type: boolean
    sql: ${TABLE}.Gate1CriteriaMet
    label: 'Gate 1 Criteria Met'

  - name: GateMetOrAccepted
    type: boolean
    sql: (${TABLE}.Gate1CriteriaMet OR ${TABLE}.Accepted)
    label: 'Gate Met or Accepted'

  - name: AccountId
    type: string
    sql: ${TABLE}.AccountId
    label: 'Account Id'

  - name: AccountOwner
    type: string
    sql: ${TABLE}.AccountOwner
    label: 'Account Owner'

  - name: OwnerDepartment
    type: string
    sql: ${TABLE}.OwnerDepartment
    label: 'Owner Department'

  # --- Numeric dimensions ---
  - name: Age__c
    type: number
    sql: ${TABLE}.Age__c
    label: 'Age'

  # --- Dynamic comparison dimensions ---
  - name: IsCurrentOrPrevYear
    type: boolean
    sql: "EXTRACT(YEAR FROM ${TABLE}.CloseDate) >= EXTRACT(YEAR FROM CURRENT_DATE()) - 1"
    hidden: true

  - name: IsQuarterUpToCurrent
    type: boolean
    sql: "EXTRACT(QUARTER FROM ${TABLE}.CloseDate) <= EXTRACT(QUARTER FROM CURRENT_DATE())"
    hidden: true

  - name: IsWithinYTDWindow
    type: boolean
    sql: "EXTRACT(DAYOFYEAR FROM ${TABLE}.CloseDate) <= EXTRACT(DAYOFYEAR FROM CURRENT_DATE())"
    hidden: true

  # --- Filter helper dimensions ---
  - name: Id
    type: string
    sql: ${TABLE}.Id
    primary_key: true
    hidden: true

  - name: StageName
    type: string
    sql: ${TABLE}.StageName
    label: 'Stage Name'

  - name: Won
    type: boolean
    sql: ${TABLE}.Won
    label: 'Won'

  - name: Accepted
    type: boolean
    sql: ${TABLE}.Accepted
    label: 'Accepted by AE'

  - name: ACV
    type: number
    sql: ${TABLE}.ACV
    label: 'ACV (raw)'
    hidden: true

  - name: HardImpValueUSD
    type: number
    sql: ${TABLE}.HardImpValueUSD
    label: 'Hard Imp Value USD'
    hidden: true

  - name: IsClosed
    type: boolean
    sql: ${TABLE}.isclosed
    label: 'Is Closed'
    hidden: true

  - name: ExpansionOpp
    type: boolean
    sql: ${TABLE}.ExpansionOpp
    label: 'Expansion Opp'
    hidden: true

  - name: MigrationOpp
    type: boolean
    sql: ${TABLE}.MigrationOpp
    label: 'Migration Opp'
    hidden: true

  - name: ExpansionQualified
    type: boolean
    sql: ${TABLE}.ExpansionQualified
    label: 'Expansion Qualified'
    hidden: true

  - name: AE_Rejected
    type: boolean
    sql: ${TABLE}.AE_Rejected
    label: 'AE Rejected'
    hidden: true

  - name: ExpansionSubmitted
    type: boolean
    sql: ${TABLE}.ExpansionSubmitted
    label: 'Expansion Submitted'
    hidden: true

  - name: sales_qualified_date__c
    type: date
    sql: ${TABLE}.sales_qualified_date__c
    label: 'Sales Qualified Date'
    time_intervals: [DAY, WEEK, MONTH, QUARTER, YEAR]
    hidden: true

metrics:
  users_sum:
    type: sum
    sql: ${TABLE}.Users
    label: 'Users'

  acv_dollars:
    type: sum
    sql: ${TABLE}.ACV
    label: 'ACV $'
    format: 'usd'
    round: 0

  sqo_count:
    type: count
    sql: ${TABLE}.Id
    label: 'SQO Count'

  bookings_count:
    type: count_distinct
    sql: ${TABLE}.Id
    label: 'Bookings #'

  hard_imp_value_usd:
    type: sum
    sql: ${TABLE}.HardImpValueUSD
    label: 'HardImpValueUSD'
    format: 'usd'
    round: 0

  annual_pacing_acv:
    type: number
    sql: "SUM(${TABLE}.ACV) * 365.0 / NULLIF(MAX(${TABLE}.CalendarDaysPassedSinceFirstDayofCloseDateFY), 0)"
    label: 'Annual Pacing $'
    format: 'usd'
    round: 0

  close_rate:
    type: number
    sql: "SUM(CASE WHEN ${TABLE}.Won = TRUE THEN 1 ELSE 0 END) * 1.0 / NULLIF(COUNT(DISTINCT ${TABLE}.Id), 0)"
    label: 'Close Rate'
    format: 'percent'
    round: 1

  avg_age:
    type: average
    sql: ${TABLE}.Age__c
    label: 'Avg Age'
    round: 0

  avg_acv:
    type: number
    sql: "SUM(${TABLE}.ACV) * 1.0 / NULLIF(COUNT(DISTINCT ${TABLE}.Id), 0)"
    label: 'Avg Booked Deal'
    format: 'usd'
    round: 0

  sdr_points_sum:
    type: sum
    sql: ${TABLE}.SDR_Points
    label: 'SDR Points'
    round: 0

  avg_users:
    type: average
    sql: ${TABLE}.Users
    label: 'Avg Users'
    round: 0

  median_users:
    type: number
    sql: "APPROX_QUANTILES(${TABLE}.Users, 2)[OFFSET(1)]"
    label: 'Median Users'
    round: 0

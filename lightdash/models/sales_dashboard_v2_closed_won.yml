type: model
name: sales_dashboard_v2_closed_won
sql_from: '`data-analytics-306119.scorecard_test.sales_dashboard_v2_closed_won_opportunities`'
label: 'Sales Dashboard v2 Closed Won'
group_label: 'Situation Room v2'

dimensions:
  - name: opportunity_id
    type: string
    sql: ${TABLE}.opportunity_id
    primary_key: true
    hidden: true
    description: 'Unique Salesforce opportunity identifier.'

  - name: dashboard_category
    type: string
    sql: ${TABLE}.dashboard_category
    label: 'Dashboard Category'
    description: 'Normalized dashboard category.'

  - name: account_name
    type: string
    sql: ${TABLE}.account_name
    label: 'Account'
    description: 'Customer account name.'

  - name: account_link
    type: string
    sql: ${TABLE}.account_link
    hidden: true
    description: 'Underlying CRM URL for the account.'

  - name: opportunity_name
    type: string
    sql: ${TABLE}.opportunity_name
    label: 'Opportunity'
    description: 'Closed-won opportunity name.'

  - name: opportunity_link
    type: string
    sql: ${TABLE}.opportunity_link
    hidden: true
    description: 'Underlying CRM URL for the opportunity.'

  - name: close_date
    type: date
    sql: ${TABLE}.close_date
    label: 'Close Date'
    description: 'Closed-won close date.'
    time_intervals: [DAY, WEEK, MONTH, QUARTER, YEAR]

  - name: created_date
    type: date
    sql: ${TABLE}.created_date
    label: 'Created Date'
    description: 'Opportunity creation date.'
    time_intervals: [DAY, WEEK, MONTH, QUARTER, YEAR]

  - name: contract_start_date
    type: date
    sql: ${TABLE}.contract_start_date
    label: 'Contract Start Date'
    description: 'Contract start date.'
    time_intervals: [DAY, WEEK, MONTH, QUARTER, YEAR]

  - name: division
    type: string
    sql: ${TABLE}.division
    label: 'Division'
    description: 'Commercial division attributed to the opportunity.'

  - name: type
    type: string
    sql: ${TABLE}.type
    label: 'Type'
    description: 'Salesforce opportunity type.'

  - name: product_family
    type: string
    sql: ${TABLE}.product_family
    label: 'Product Family'
    description: 'Primary product family associated with the opportunity.'

  - name: booking_plan_opp_type_2025
    type: string
    sql: ${TABLE}.booking_plan_opp_type_2025
    label: 'Booking Plan Opp Type 2025'
    description: '2025 booking-plan opportunity type classification.'

  - name: owner
    type: string
    sql: ${TABLE}.owner
    label: 'Owner'
    description: 'Current opportunity owner.'

  - name: sdr
    type: string
    sql: ${TABLE}.sdr
    label: 'SDR'
    description: 'Sales development representative credited on the opportunity.'

  - name: opp_record_type
    type: string
    sql: ${TABLE}.opp_record_type
    label: 'POR / R360'
    description: 'Opportunity record family used in POR versus R360 reporting.'

  - name: age_days
    type: number
    sql: ${TABLE}.age_days
    label: 'Age'
    description: 'Opportunity age in days.'

  - name: se
    type: string
    sql: ${TABLE}.se
    label: 'SE'
    description: 'Assigned sales engineer.'

  - name: quarter_label
    type: string
    sql: ${TABLE}.quarter_label
    label: 'Quarter'
    description: 'Quarter label in YYYY-QN form.'

  - name: users
    type: number
    sql: ${TABLE}.users
    label: 'Users'
    description: 'User count associated with the opportunity.'

  - name: acv
    type: number
    sql: ${TABLE}.acv
    label: 'ACV'
    description: 'Annual contract value in USD.'

  - name: region
    type: string
    sql: ${TABLE}.region
    hidden: true
    description: 'Regional queue associated with the opportunity.'

  - name: account_owner
    type: string
    sql: ${TABLE}.account_owner
    hidden: true
    description: 'Owner of the related account.'

  - name: owner_department
    type: string
    sql: ${TABLE}.owner_department
    hidden: true
    description: 'Department of the current opportunity owner.'

  - name: strategic_filter
    type: boolean
    sql: ${TABLE}.strategic_filter
    hidden: true
    description: 'Strategic-filter flag.'

  - name: accepted
    type: boolean
    sql: ${TABLE}.accepted
    hidden: true
    description: 'Accepted flag.'

  - name: gate1_criteria_met
    type: boolean
    sql: ${TABLE}.gate1_criteria_met
    hidden: true
    description: 'Gate 1 criteria met flag.'

  - name: gate_met_or_accepted
    type: boolean
    sql: ${TABLE}.gate_met_or_accepted
    hidden: true
    description: 'Gate-met-or-accepted helper flag.'

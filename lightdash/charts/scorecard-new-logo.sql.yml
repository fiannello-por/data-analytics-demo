name: 'Scorecard: New Logo'
description: New Logo metrics table (Option B)
slug: scorecard-new-logo
sql: |-
  WITH t AS (
    SELECT * FROM `data-analytics-306119.sfdc.OpportunityViewTable`
    WHERE CloseDate >= DATE_SUB(CURRENT_DATE(), INTERVAL 12 MONTH)
    AND Type = 'New Business'
  ),
  fy AS (
    SELECT * FROM `data-analytics-306119.sfdc.OpportunityViewTable`
    WHERE EXTRACT(YEAR FROM CloseDate) = EXTRACT(YEAR FROM CURRENT_DATE())
    AND Type = 'New Business'
  )
  SELECT Metric, Value FROM (
    SELECT 1 AS s, 'Bookings $' AS Metric,
      CONCAT('$', FORMAT('%.0f', SUM(CASE WHEN Won THEN ACV END))) AS Value FROM t
    UNION ALL
    SELECT 2, 'Bookings #',
      FORMAT('%.0f', CAST(COUNT(DISTINCT CASE WHEN Won THEN Id END) AS FLOAT64)) FROM t
    UNION ALL
    SELECT 3, 'Annual Pacing',
      CONCAT('$', FORMAT('%.0f', SUM(CASE WHEN Won THEN ACV END) * 365.0 / NULLIF(MAX(CalendarDaysPassedSinceFirstDayofCloseDateFY), 0))) FROM fy
    UNION ALL
    SELECT 4, 'Close Rate',
      CONCAT(FORMAT('%.1f', SUM(CASE WHEN isclosed AND Won THEN 1 ELSE 0 END) * 100.0 / NULLIF(COUNT(DISTINCT CASE WHEN isclosed THEN Id END), 0)), '%') FROM t
    UNION ALL
    SELECT 5, 'Avg Age',
      CAST(ROUND(AVG(CASE WHEN Accepted THEN Age__c END)) AS STRING) FROM t
    UNION ALL
    SELECT 6, 'Avg Booked Deal',
      CONCAT('$', FORMAT('%.0f', SUM(CASE WHEN Won THEN ACV END) / NULLIF(COUNT(DISTINCT CASE WHEN Won THEN Id END), 0))) FROM t
    UNION ALL
    SELECT 7, 'Pipeline Created',
      CONCAT('$', FORMAT('%.0f', SUM(CASE WHEN ACV>0 THEN ACV END))) FROM t
    UNION ALL
    SELECT 8, 'SQL',
      FORMAT('%.0f', CAST(COUNT(DISTINCT Id) AS FLOAT64)) FROM t
    UNION ALL
    SELECT 9, 'SQO',
      FORMAT('%.0f', CAST(COUNT(DISTINCT CASE WHEN Accepted AND OppRecordType='POR' THEN Id END) AS FLOAT64)) FROM t
    UNION ALL
    SELECT 10, 'Gate 1 Complete',
      FORMAT('%.0f', CAST(COUNT(DISTINCT CASE WHEN Gate1CriteriaMet OR Accepted OR AE_Rejected THEN Id END) AS FLOAT64)) FROM t
    UNION ALL
    SELECT 11, 'SDR Points',
      FORMAT('%.0f', SUM(CASE WHEN Gate1CriteriaMet OR Accepted OR AE_Rejected THEN SDR_Points END)) FROM t
    UNION ALL
    SELECT 12, 'SQO Users',
      FORMAT('%.0f', SUM(CASE WHEN Accepted AND sales_qualified_date__c IS NOT NULL THEN Users END)) FROM t
  ) sub
  ORDER BY s
limit: 500
config:
  type: table
  columns:
    Value:
      label: Value
      order: 1
      frozen: false
      visible: true
      reference: Value
    Metric:
      label: Metric
      order: 0
      frozen: false
      visible: true
      reference: Metric
  metadata:
    version: 1

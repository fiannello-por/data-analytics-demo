name: 'Scorecard: Expansion'
description: Expansion metrics table (Option B)
slug: scorecard-expansion
sql: |-
  WITH t AS (
    SELECT * FROM `data-analytics-306119.sfdc.OpportunityViewTable`
    WHERE CloseDate >= DATE_SUB(CURRENT_DATE(), INTERVAL 12 MONTH)
    AND Type = 'Existing Business'
  ),
  fy AS (
    SELECT * FROM `data-analytics-306119.sfdc.OpportunityViewTable`
    WHERE EXTRACT(YEAR FROM CloseDate) = EXTRACT(YEAR FROM CURRENT_DATE())
    AND Type = 'Existing Business'
  )
  SELECT Metric, Value FROM (
    SELECT 1 AS s, 'Bookings $' AS Metric,
      CONCAT('$', FORMAT('%.0f', SUM(CASE WHEN Won AND ACV>=0 THEN ACV END))) AS Value FROM t
    UNION ALL
    SELECT 2, 'Bookings #',
      FORMAT('%.0f', CAST(COUNT(DISTINCT CASE WHEN Won AND ACV>=0 THEN Id END) AS FLOAT64)) FROM t
    UNION ALL
    SELECT 3, 'Annual Pacing',
      CONCAT('$', FORMAT('%.0f', SUM(CASE WHEN Won AND ACV>=0 THEN ACV END) * 365.0 / NULLIF(MAX(CalendarDaysPassedSinceFirstDayofCloseDateFY), 0))) FROM fy
    UNION ALL
    SELECT 4, 'Close Rate',
      CONCAT(FORMAT('%.1f', SUM(CASE WHEN isclosed AND ExpansionOpp AND Won THEN 1 ELSE 0 END) * 100.0 / NULLIF(COUNT(DISTINCT CASE WHEN isclosed AND ExpansionOpp THEN Id END), 0)), '%') FROM t
    UNION ALL
    SELECT 5, 'Avg Age',
      CAST(ROUND(AVG(CASE WHEN ExpansionOpp AND ExpansionQualified AND ACV>=0 THEN Age__c END)) AS STRING) FROM t
    UNION ALL
    SELECT 6, 'Avg Booked Deal',
      CONCAT('$', FORMAT('%.0f', SUM(CASE WHEN Won AND ACV>0 THEN ACV END) / NULLIF(COUNT(DISTINCT CASE WHEN Won AND ACV>0 THEN Id END), 0))) FROM t
    UNION ALL
    SELECT 7, 'Pipeline Created',
      CONCAT('$', FORMAT('%.0f', SUM(CASE WHEN ExpansionOpp AND ACV>0 THEN ACV END))) FROM t
    UNION ALL
    SELECT 8, 'SQL',
      FORMAT('%.0f', CAST(COUNT(DISTINCT CASE WHEN ExpansionOpp THEN Id END) AS FLOAT64)) FROM t
    UNION ALL
    SELECT 9, 'SQO',
      FORMAT('%.0f', CAST(COUNT(DISTINCT CASE WHEN ExpansionOpp AND ExpansionQualified AND ACV>=0 AND OppRecordType='POR' THEN Id END) AS FLOAT64)) FROM t
  ) sub
  ORDER BY s
limit: 500

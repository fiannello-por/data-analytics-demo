name: 'Expansion: Avg Age'
description: 'Average age in days for won expansion opportunities over the last 12 months.'
tableName: opportunity_view
metricQuery:
  exploreName: opportunity_view
  dimensions: []
  metrics:
    - opportunity_view_avg_age
  filters:
    dimensions:
      id: root
      and:
        - id: won_filter
          target:
            fieldId: opportunity_view_Won
          values:
            - true
          operator: equals
        - id: type_filter
          target:
            fieldId: opportunity_view_Type
          values:
            - Existing Business
          operator: equals
        - id: acv_positive
          target:
            fieldId: opportunity_view_ACV
          values:
            - 0
          operator: greaterThan
        - id: date_filter
          target:
            fieldId: opportunity_view_CloseDate
          values:
            - 12
          operator: inThePast
          settings:
            completed: false
            unitOfTime: months
  sorts: []
  limit: 1
  metricOverrides: {}
  dimensionOverrides: {}
  tableCalculations: []
  additionalMetrics: []
  customDimensions: []
chartConfig:
  type: big_number
  config:
    label: Avg Age
    selectedField: opportunity_view_avg_age
    showComparison: true
    comparisonLabel: vs. prev year
    comparisonFormat: percentage
    showBigNumberLabel: true
slug: expansion-avg-age
tableConfig:
  columnOrder:
    - opportunity_view_avg_age
spaceSlug: shared
version: 1

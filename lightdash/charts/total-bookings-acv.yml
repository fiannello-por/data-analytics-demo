name: 'Total: Bookings $'
description: 'Booked ACV for all closed won opportunities over the last 12 months.'
tableName: opportunity_view
updatedAt: '2026-03-09T13:45:14.452Z'
metricQuery:
  exploreName: opportunity_view
  dimensions: []
  metrics:
    - opportunity_view_acv_dollars
  filters:
    dimensions:
      id: root
      and:
        - id: won_filter
          target:
            fieldId: opportunity_view_Won
          values:
            - true
          operator: equals
        - id: acv_positive
          target:
            fieldId: opportunity_view_ACV
          values:
            - 0
          operator: greaterThan
        - id: stage_filter
          target:
            fieldId: opportunity_view_StageName
          values:
            - Closed Won
          operator: equals
        - id: date_filter
          target:
            fieldId: opportunity_view_CloseDate
          values:
            - 12
          operator: inThePast
          settings:
            completed: false
            unitOfTime: months
  sorts: []
  limit: 1
  metricOverrides: {}
  dimensionOverrides: {}
  tableCalculations: []
  additionalMetrics: []
  customDimensions: []
chartConfig:
  type: big_number
  config:
    label: Bookings $
    style: K
    selectedField: opportunity_view_acv_dollars
    showComparison: true
    comparisonLabel: vs. prev year
    comparisonFormat: percentage
    showBigNumberLabel: true
slug: total-bookings-acv
tableConfig:
  columnOrder:
    - opportunity_view_acv_dollars
spaceSlug: shared
version: 1
downloadedAt: '2026-03-09T15:49:11.524Z'

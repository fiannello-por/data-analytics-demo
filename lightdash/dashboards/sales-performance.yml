    type: markdown
    properties:
      title: Legend / Glossary
      hideTitle: false
      content: >
        | Term | Definition | Term | Definition |

        |------|------------|------|------------|

        | **Account Hyperlink** | Company name of the Account, hyperlinked to
        Salesforce CRM URL | **SDR** | Sales Development Representative assigned
        to the opportunity |

        | **Opp Hyperlink** | Name of the Opportunity, hyperlinked to its
        Salesforce URL | **SE** | Sales Engineer assigned to the opportunity |

        | **Close Date** | Date the opportunity was/is expected to close | **SDR
        Source** | Lead source channel (Inbound, AE Sourced, Outbound, AM
        Sourced, Tradeshow, Partnerships) |

        | **Owner** | Sales rep who owns the opportunity | **Age** | Number of
        days since the opportunity was created |

        | **Division** | Geographic division (US or UK) | **ACV** | Annual
        Contract Value - the annualized recurring revenue value of the deal |

        | **Type** | Category of deal (New Business, Migration, Existing
        Business, Renewal, Consulting, Credit Card) | **HardImpValueUSD** |
        One-time implementation/hardware revenue in USD |

        | **Product Family** | Product line (Syrinx, Rental Elite) | **Won** |
        Whether the opportunity has been marked as won (true/false) |

        | **Stage** | Current sales stage of the opportunity | **Accepted** |
        Whether the opportunity was accepted by the Account Executive |

        | **POR / R360** | Whether the opportunity is Point of Rental or Rental
        360 | **SQO Count** | Sales Qualified Opportunity count - number of
        accepted new business opportunities |

        | **Booking Plan Opp Type 2025** | Classification for 2025 booking plan
        | **Users** | Number of user licenses on the opportunity |

        | **Quarter** | Fiscal quarter derived from Close Date | **Install
        Date** | Expected or actual installation date |

        | **Contract Start Date** | Date the contract begins | **Created Date**
        | Date the opportunity was created in Salesforce |
      hideFrame: false

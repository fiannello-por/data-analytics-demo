    type: markdown
    properties:
      title: Legend / Glossary
      hideTitle: false
      content: >
        | Term | Definition | Date Dimension (if applicable) | Rules &amp; key
        notes |

        |------|------------|-------------------------------|-------------------|

        | **ACV** | Annual Contract Value used for bookings and pipeline. | - |
        Recurring only; one-time revenue tracked separately. |

        | **Accepted to Closed Won (Avg)** | Average number of days from
        Accepted date to Closed Won date. | Accepted Date -&gt; Close Date | - |

        | **Attach Rate (POR One)** | % of Closed Won with POR One attached. |
        Close Month | - |

        | **Avg. Age** | Average number of days opps have been open (or sitting
        in a stage). | Varies (Created-&gt;Submitted, Submitted-&gt;Accepted,
        etc.) | - |

        | **Avg. Booked Deal (ACV)** | Average ACV amount of Closed Won
        opportunities where ACV &gt; 0 | Close Date | - |

        | **Avg. Users** | Average (mean) number of users (licenses/seats)
        across Closed Won opps. | Close Date | - |

        | **Bookings (ACV)** | Sum of ACV for Closed Won opportunities in
        period. | Close Date | Exclude one-time revenue unless stated. |

        | **Close Rate** | # of Closed Won opportunities divided by # of ALL
        closed opportunities (won, lost, etc) | Close Date | - |

        | **Current Year Annual Pacing** | Year-end projection based on YTD
        bookings pace. | Year-to-date window | Directional. |

        | **EQL (Expansion / Migration)** | Expansion Qualified Lead from an
        existing customer. | Case Created Date OR Opportunity Created Date |
        Expansion &amp; Migration top of funnel. Inside sales case = Inbound. |

        | **Expansion** | Upsell/cross-sell within existing customers. | - |
        Opportunity Type = Existing Business |

        | **Migration** | Move legacy/on-prem to current SaaS platform/plan. | -
        | Opportunity Type = Migration |

        | **Net Growth YoY** | Percent change vs prior rolling period. | Rolling
        windows | - |

        | **New Logo** | First-time customer acquisition motion. | - |
        Opportunity Type = New Business |

        | **One-time Revenue** | Non-recurring revenue (services, hardware,
        implementation). | Close Date | - |

        | **Owner (Account)** | Account Owner | - | - |

        | **Owner (Opportunity)** | Opportunity Owner | - | - |

        | **Product Family** | Product grouping (Elite, Expert, Essentials,
        Syrinx, Record360, etc.) | - | - |

        | **Renewals** | Extends an existing subscription term. | - |
        Opportunity Type = Renewal |

        | **RollingYearRentalRevenue** | Trailing-12 rental revenue. | Rolling
        12 months | Compare vs RollingLastYear for YoY. |

        | **SAL (Migration)** | Sales Accepted Lead (Gate 1 complete) for a
        migration opportunity. | Gate 1 Completed Date | Opportunity Type =
        Migration |

        | **SDR** | SDR of record on the opportunity | - | - |

        | **SQL (Expansion)** | Expansion Sales Qualified Lead from an EQL. |
        Opportunity Created Date | Opportunity Type = Existing Business |

        | **SQL (Migration)** | Sales Qualified Lead where the customer is
        migrating from a competitor. | Created Date / Discovery Scheduled Date |
        Opportunity Type = Migration |

        | **SQO (Expansion)** | Expansion Qualified Opportunity from an EQL. |
        Expansion Qualified Date | Opportunity Type = Existing Business |

        | **SQO (Migration)** | Sales Qualified Opportunity for a migration
        opportunity. | Qualified Date | Opportunity Type = Migration |

        | **SQO Users** | User/seat count for opportunities that reached SQO. |
        Qualified Date (sales_qualified_date__c) | - |

        | **Segment** | Business segment; based on # of Users. Velocity = up to
        3 Users, SMB = between 4 - 35 Users, Mid-Market = between 36 - 150
        Users, Enterprise = over 150 Users. | - | Opportunity Segment by User
        Count |

        | **Won** | The deal is won—contract executed, terms agreed; the
        Opportunity is closed as Won. | Opportunity Close Date | StageName =
        Closed Won |

        | **Won/MQL** | % of MQLs that ultimately become Closed Won. | - | - |

        | **Won/SQL** | % of SQLs that ultimately become Closed Won. | - | - |
      hideFrame: false

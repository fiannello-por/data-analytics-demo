version: 2

models:
  - name: scorecard_report_rows
    description: Pre-shaped scorecard rows for the Situation Room report adapter.
    columns:
      - name: category
        tests: [not_null]
      - name: sort_order
        tests: [not_null]
      - name: metric_name
        tests: [not_null]
      - name: report_date
        description: Snapshot date preserved in the serving-model grain.
        tests: [not_null]

  - name: scorecard_filter_dictionary
    description: Distinct filter values keyed for Situation Room dictionary endpoints.
    columns:
      - name: filter_key
        tests: [not_null]
      - name: value
        tests: [not_null]

  - name: sales_dashboard_v2_opportunity_base
    description: Reusable opportunity-grain serving table for Situation Room semantic v2 queries.
    columns:
      - name: opportunity_id
        tests: [not_null]
      - name: dashboard_category
        description: Nullable for opportunities that should roll into Total but not a named dashboard category.

  - name: sales_dashboard_v2_closed_won_opportunities
    description: Narrow closed-won opportunity serving table for Situation Room semantic v2 detail queries.
    columns:
      - name: opportunity_id
        tests: [not_null]

type: model
name: opportunity_view
sql_from: 'data-analytics-306119.sfdc.OpportunityViewTable'
label: 'Opportunity View'
group_label: 'Sales Operations'

dimensions:
  # --- Hyperlink dimensions ---
  - name: AccountName
    type: string
    sql: ${TABLE}.AccountName
    label: 'Account Hyperlink'
    description: 'Account display name linked to the source CRM account record.'
    urls:
      - label: 'Open Account'
        url: '${row.AccountLink.raw}'

  - name: OpportunityName
    type: string
    sql: ${TABLE}.OpportunityName
    label: 'Opp Hyperlink'
    description: 'Opportunity display name linked to the source CRM opportunity record.'
    urls:
      - label: 'Open Opportunity'
        url: '${row.OpportunityLink.raw}'

  - name: AccountLink
    type: string
    sql: ${TABLE}.AccountLink
    description: 'Underlying CRM URL for the account hyperlink dimension.'
    hidden: true

  - name: OpportunityLink
    type: string
    sql: ${TABLE}.OpportunityLink
    description: 'Underlying CRM URL for the opportunity hyperlink dimension.'
    hidden: true

  # --- Date dimensions ---
  - name: CloseDate
    type: date
    sql: ${TABLE}.CloseDate
    label: 'Close Date'
    description: 'Opportunity close date used for booked revenue, pacing, and close-rate reporting.'
    time_intervals: [DAY, WEEK, MONTH, QUARTER, YEAR]

  - name: CreatedDate
    type: date
    sql: ${TABLE}.CreatedDate
    label: 'Created Date'
    description: 'Opportunity creation date in Salesforce.'
    time_intervals: [DAY, WEEK, MONTH, QUARTER, YEAR]

  - name: contract_start_date__c
    type: date
    sql: ${TABLE}.contract_start_date__c
    label: 'Contract Start Date'
    description: 'Contract start date associated with the opportunity, when populated.'
    time_intervals: [DAY, WEEK, MONTH, QUARTER, YEAR]

  - name: QualifiedDate
    type: date
    sql: ${TABLE}.QualifiedDate
    label: 'Qualified Date'
    description: 'Date the opportunity reached the qualified stage used for SQO trend analysis.'
    time_intervals: [DAY, WEEK, MONTH, QUARTER, YEAR]

  - name: InstallDate
    type: date
    sql: ${TABLE}.InstallDate
    label: 'Install Date'
    description: 'Planned or actual install date tied to the opportunity.'
    time_intervals: [DAY, WEEK, MONTH, QUARTER, YEAR]

  - name: Quarter
    type: string
    sql: "CONCAT(CAST(EXTRACT(YEAR FROM ${TABLE}.CloseDate) AS STRING), '-Q', CAST(EXTRACT(QUARTER FROM ${TABLE}.CloseDate) AS STRING))"
    label: 'Quarter'
    description: 'Custom close-date quarter label in YYYY-QN format for table displays.'

  # --- String dimensions ---
  - name: Division
    type: string
    sql: ${TABLE}.Division
    description: 'Sales division attributed to the opportunity.'

  - name: Type
    type: string
    sql: ${TABLE}.Type
    description: 'Opportunity motion such as New Business, Existing Business, or Migration.'

  - name: ProductFamily
    type: string
    sql: ${TABLE}.ProductFamily
    label: 'Product'
    description: 'Primary product family associated with the opportunity.'

  - name: BookingPlanOppType2025
    type: string
    sql: ${TABLE}.BookingPlanOppType2025
    label: 'Booking Plan Opp Type 2025'
    description: '2025 booking-plan classification used by revenue operations.'

  - name: Owner
    type: string
    sql: ${TABLE}.Owner
    description: 'Current opportunity owner.'

  - name: SDR
    type: string
    sql: ${TABLE}.SDR
    description: 'Sales development representative credited on the opportunity.'

  - name: OppRecordType
    type: string
    sql: ${TABLE}.OppRecordType
    label: 'POR / R360'
    description: 'Opportunity record family distinguishing Point of Rental and Rental 360 motions.'

  - name: SE
    type: string
    sql: ${TABLE}.SE
    description: 'Sales engineer assigned to the opportunity.'

  - name: SDRSource
    type: string
    sql: ${TABLE}.SDRSource
    label: 'SDR Source'
    description: 'Lead or sourcing channel attributed to the SDR motion.'

  - name: OpportunitySegment
    type: string
    sql: ${TABLE}.OpportunitySegment
    label: 'Segment'
    description: 'Market or customer segment assigned to the opportunity.'

  - name: Queue_Region__c
    type: string
    sql: ${TABLE}.Queue_Region__c
    label: 'Region'
    description: 'Regional queue or territory label used in sales operations.'

  - name: StrategicFilter
    type: boolean
    sql: ${TABLE}.StrategicFilter
    label: 'Strategic Filter'
    description: 'Flag identifying opportunities treated as strategic in dashboard filters.'

  - name: Gate1CriteriaMet
    type: boolean
    sql: ${TABLE}.Gate1CriteriaMet
    label: 'Gate 1 Criteria Met'
    description: 'Flag for whether the opportunity met the first qualification gate.'

  - name: AccountId
    type: string
    sql: ${TABLE}.AccountId
    label: 'Account Id'
    description: 'Raw Salesforce account identifier for operational filtering.'

  - name: AccountOwner
    type: string
    sql: ${TABLE}.AccountOwner
    label: 'Account Owner'
    description: 'Owner of the related account record.'

  - name: OwnerDepartment
    type: string
    sql: ${TABLE}.OwnerDepartment
    label: 'Owner Department'
    description: 'Department associated with the current opportunity owner.'

  # --- Numeric dimensions ---
  - name: Age__c
    type: number
    sql: ${TABLE}.Age__c
    label: 'Age'
    description: 'Opportunity age in days at the time represented by the source record.'

  # --- Filter helper dimensions ---
  - name: Id
    type: string
    sql: ${TABLE}.Id
    primary_key: true
    description: 'Unique Salesforce opportunity identifier.'
    hidden: true

  - name: StageName
    type: string
    sql: ${TABLE}.StageName
    label: 'Stage Name'
    description: 'Current Salesforce stage for the opportunity.'

  - name: Won
    type: boolean
    sql: ${TABLE}.Won
    label: 'Won'
    description: 'True when the opportunity is marked won in the source CRM.'

  - name: Accepted
    type: boolean
    sql: ${TABLE}.Accepted
    label: 'Accepted by AE'
    description: 'True when the opportunity was accepted by an account executive.'

  - name: ACV
    type: number
    sql: ${TABLE}.ACV
    label: 'ACV (raw)'
    description: 'Raw annual contract value before aggregation or formatting.'
    hidden: true

  - name: HardImpValueUSD
    type: number
    sql: ${TABLE}.HardImpValueUSD
    label: 'Hard Imp Value USD'
    description: 'Raw one-time implementation revenue value in USD.'
    hidden: true

  - name: IsClosed
    type: boolean
    sql: ${TABLE}.isclosed
    label: 'Is Closed'
    description: 'True when the opportunity is in any closed stage.'
    hidden: true

  - name: AE_Rejected
    type: boolean
    sql: ${TABLE}.AE_Rejected
    label: 'AE Rejected'
    description: 'True when an AE has rejected the opportunity.'

  - name: ExpansionOpp
    type: boolean
    sql: ${TABLE}.ExpansionOpp
    label: 'Expansion Opp'
    description: 'True for expansion (upsell/cross-sell) opportunities.'

  - name: ExpansionQualified
    type: boolean
    sql: ${TABLE}.ExpansionQualified
    label: 'Expansion Qualified'
    description: 'True when an expansion opportunity has reached the qualified stage.'

  - name: ExpansionSubmitted
    type: boolean
    sql: ${TABLE}.ExpansionSubmitted
    label: 'Expansion Submitted'
    description: 'True when an expansion opportunity has been submitted for review.'

  - name: MigrationOpp
    type: boolean
    sql: ${TABLE}.MigrationOpp
    label: 'Migration Opp'
    description: 'True for migration opportunities moving from legacy to current platform.'

  - name: IsCurrentOrPrevYear
    type: boolean
    sql: 'EXTRACT(YEAR FROM ${TABLE}.CloseDate) >= EXTRACT(YEAR FROM CURRENT_DATE()) - 1'
    label: 'Current or Prev Year'
    description: 'True when close date falls in the current or previous calendar year.'

  - name: IsWithinYTDWindow
    type: boolean
    sql: 'EXTRACT(DAYOFYEAR FROM ${TABLE}.CloseDate) <= EXTRACT(DAYOFYEAR FROM CURRENT_DATE())'
    label: 'Within YTD Window'
    description: 'True when close date is on or before the current day of year, enabling apples-to-apples YTD comparisons across years.'
    hidden: true

  - name: sales_qualified_date__c
    type: date
    sql: ${TABLE}.sales_qualified_date__c
    label: 'Sales Qualified Date'
    description: 'Date the opportunity was sales-qualified.'
    time_intervals: [DAY, WEEK, MONTH, QUARTER, YEAR]

  - name: GateMetOrAccepted
    type: boolean
    sql: '(${TABLE}.Gate1CriteriaMet OR ${TABLE}.Accepted)'
    label: 'Gate Met or Accepted'
    description: 'True when the opportunity has met Gate 1 criteria or been accepted by an AE.'

metrics:
  users_sum:
    type: sum
    sql: ${TABLE}.Users
    label: 'Users'
    description: 'Total users associated with the filtered opportunity set.'

  acv_dollars:
    type: sum
    sql: ${TABLE}.ACV
    label: 'ACV $'
    format: 'usd'
    round: 0
    description: 'Booked annual contract value in USD for the filtered opportunity set.'

  sqo_count:
    type: count
    sql: ${TABLE}.Id
    label: 'SQO Count'
    description: 'Count of opportunity rows after chart-level qualification filters are applied; use charts to define the exact SQO population.'

  bookings_count:
    type: count_distinct
    sql: ${TABLE}.Id
    label: 'Bookings #'
    description: 'Distinct opportunity count for the filtered booked population, typically paired with Closed Won filters in charts.'

  hard_imp_value_usd:
    type: sum
    sql: ${TABLE}.HardImpValueUSD
    label: 'HardImpValueUSD'
    format: 'usd'
    round: 0
    description: 'Total one-time implementation revenue in USD for the filtered opportunity set.'

  annual_pacing_acv:
    type: number
    sql: 'SUM(${TABLE}.ACV) * 365.0 / NULLIF(MAX(${TABLE}.CalendarDaysPassedSinceFirstDayofCloseDateFY), 0)'
    label: 'Annual Pacing $'
    format: 'usd'
    round: 0
    description: 'Annualized booked ACV pace based on year-to-date progress in the filtered period.'

  close_rate:
    type: number
    sql: 'SUM(CASE WHEN ${TABLE}.Won = TRUE THEN 1 ELSE 0 END) * 1.0 / NULLIF(COUNT(DISTINCT ${TABLE}.Id), 0)'
    label: 'Close Rate'
    format: 'percent'
    round: 1
    description: 'Share of filtered opportunities marked won out of the filtered closed opportunity set.'

  avg_age:
    type: average
    sql: ${TABLE}.Age__c
    label: 'Avg Age'
    round: 0
    description: 'Average opportunity age in days for the filtered population.'

  avg_acv:
    type: number
    sql: 'SUM(${TABLE}.ACV) * 1.0 / NULLIF(COUNT(DISTINCT ${TABLE}.Id), 0)'
    label: 'Avg Booked Deal'
    format: 'usd'
    round: 0
    description: 'Average ACV per distinct filtered opportunity.'

  avg_users:
    type: average
    sql: ${TABLE}.Users
    label: 'Avg Users'
    round: 0
    description: 'Average user/seat count across the filtered opportunity set.'

  median_users:
    type: median
    sql: ${TABLE}.Users
    label: 'Median Users'
    round: 0
    description: 'Median user/seat count across the filtered opportunity set.'

  sdr_points_sum:
    type: sum
    sql: ${TABLE}.SDR_Points
    label: 'SDR Points'
    round: 0
    description: 'Total SDR points credited across the filtered opportunity set.'

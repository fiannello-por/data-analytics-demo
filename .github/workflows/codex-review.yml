name: Codex Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Ensure OpenAI secret is configured
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          test -n "$OPENAI_API_KEY" || (echo "::error::Missing OPENAI_API_KEY" && exit 1)

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Review pull request
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_CODEX_MODEL: ${{ vars.OPENAI_CODEX_MODEL || 'gpt-5.3-codex' }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: pnpm review:pr

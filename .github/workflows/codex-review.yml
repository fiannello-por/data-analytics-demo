name: Codex Review

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: codex-review-${{ github.event.workflow_run.pull_requests[0].number || github.event.workflow_run.id }}
  cancel-in-progress: true

jobs:
  review:
    # Only review when CI passes on a pull request (skip pushes to main and failed CI)
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.pull_requests[0]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Ensure OpenAI secret is configured
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          test -n "$OPENAI_API_KEY" || (echo "::error::Missing OPENAI_API_KEY" && exit 1)

      - name: Set up uv
        uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731bb6ce540c5af426746bb # v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Review pull request
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_CODEX_MODEL: ${{ vars.OPENAI_CODEX_MODEL || 'gpt-5.2-codex' }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: uv run review-pr

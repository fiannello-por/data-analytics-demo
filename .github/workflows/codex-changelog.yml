name: Codex Changelog

on:
  pull_request_target:
    types:
      - closed

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: codex-changelog-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  changelog:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main

      - name: Ensure OpenAI secret is configured
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          test -n "$OPENAI_API_KEY" || (echo "::error::Missing OPENAI_API_KEY" && exit 1)

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install Python dependencies
        run: uv sync

      - name: Generate changelog entry
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_CODEX_MODEL: ${{ vars.OPENAI_CODEX_MODEL || 'gpt-5.2-codex' }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: uv run generate-changelog

      - name: Commit generated changelog
        id: commit_changelog
        run: |
          if git diff --quiet --exit-code; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changelog update required"
            exit 0
          fi
          branch="automation/changelog-pr-${{ github.event.pull_request.number }}"
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"
          git switch -c "$branch"
          git add apps/changelog-site/blog
          git commit -m "docs(changelog): update from PR #${{ github.event.pull_request.number }} [skip ci]"
          git push --force --set-upstream origin "$branch"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open or update changelog pull request
        if: steps.commit_changelog.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch="automation/changelog-pr-${{ github.event.pull_request.number }}"
          title="docs(changelog): update from PR #${{ github.event.pull_request.number }}"
          body=$(printf '%s\n' \
            "Automated changelog follow-up for merged PR #${{ github.event.pull_request.number }}." \
            "" \
            "This PR contains sanitized changelog content generated from the merged PR metadata and diff.")

          existing_pr="$(gh pr list --base main --head "$branch" --state open --json number --jq '.[0].number')"

          if [ -n "$existing_pr" ]; then
            gh pr edit "$existing_pr" --title "$title" --body "$body"
          else
            gh pr create --base main --head "$branch" --title "$title" --body "$body"
          fi

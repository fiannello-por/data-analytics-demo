name: Deploy Lightdash

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lightdash-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      LIGHTDASH_API_KEY: ${{ secrets.LIGHTDASH_API_TOKEN }}
      LIGHTDASH_URL: ${{ secrets.LIGHTDASH_URL }}
      LIGHTDASH_PROJECT: ${{ secrets.LIGHTDASH_PROJECT_UUID }}
    steps:
      - name: Explain manual-only deployment
        run: echo "Lightdash deployment is manual-only to avoid changing live dashboards on merge."

      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Ensure Lightdash secrets are configured
        run: |
          test -n "$LIGHTDASH_API_KEY" || (echo "::error::Missing LIGHTDASH_API_KEY" && exit 1)
          test -n "$LIGHTDASH_URL" || (echo "::error::Missing LIGHTDASH_URL" && exit 1)
          test -n "$LIGHTDASH_PROJECT" || (echo "::error::Missing LIGHTDASH_PROJECT" && exit 1)

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Install Lightdash CLI
        run: npm install -g "@lightdash/cli@$(cat semantic/lightdash/.lightdash-version)"

      - name: Deploy semantic layer
        run: cd semantic/lightdash && lightdash deploy --no-warehouse-credentials

      - name: Upload charts and dashboards
        run: cd semantic/lightdash && lightdash upload --path . --force

name: Cleanup Lightdash Preview

on:
  pull_request:
    types:
      - closed
    paths:
      - 'lightdash/**'
      - 'lightdash.config.yml'

permissions:
  contents: read
  deployments: write

concurrency:
  group: lightdash-preview-cleanup-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cleanup:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      LIGHTDASH_API_KEY: ${{ secrets.LIGHTDASH_API_TOKEN }}
      LIGHTDASH_URL: ${{ secrets.LIGHTDASH_URL }}
      LIGHTDASH_PROJECT: ${{ secrets.LIGHTDASH_PROJECT_UUID }}
      LIGHTDASH_PREVIEW_NAME: pr-${{ github.event.pull_request.number }}
    steps:
      - name: Ensure Lightdash secrets are configured
        run: |
          test -n "$LIGHTDASH_API_KEY" || (echo "::error::Missing LIGHTDASH_API_KEY" && exit 1)
          test -n "$LIGHTDASH_URL" || (echo "::error::Missing LIGHTDASH_URL" && exit 1)
          test -n "$LIGHTDASH_PROJECT" || (echo "::error::Missing LIGHTDASH_PROJECT" && exit 1)

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'

      - name: Install Lightdash CLI
        run: npm install -g @lightdash/cli@0.2596.0

      - name: Stop preview project
        run: lightdash stop-preview --name "$LIGHTDASH_PREVIEW_NAME"

      - name: Mark deployment as inactive
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const environment = `lightdash-preview-pr-${context.issue.number}`;
            const deployments = await github.rest.repos.listDeployments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              environment,
              per_page: 1,
            });
            for (const deployment of deployments.data) {
              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployment.id,
                state: 'inactive',
              });
            }
